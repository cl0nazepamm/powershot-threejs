<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PowerSHOT · WebGPU realtime ISP</title>
<link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="stage"><canvas id="view"></canvas></div>
  <div id="panel">
    <h1>PowerSHOT<small>realtime ISP · WebGPU / TSL</small></h1>

    <div>
      <label for="mode">Signal</label>
      <select id="mode">
        <option value="analog">Analog</option>
        <option value="digital">Digital</option>
        <option value="film">Film</option>
        <option value="infrared">White Phosphor</option>
      </select>
    </div>

    <div>
      <label for="resolution">Resolution · <span id="resolutionval">0.65x</span></label>
      <input id="resolution" type="range" min="10" max="100" step="5" value="65">
    </div>

    <div id="digital-controls">
    <div>
      <label for="preset">Camera preset</label>
      <select id="preset"></select>
    </div>

    <div>
      <label for="lens">Lens softness · <span id="lensval">0.28</span></label>
      <input id="lens" type="range" min="0" max="300" value="28">
    </div>

    <div>
      <label for="bloom">CCD bloom · <span id="bloomval">1.12</span></label>
      <input id="bloom" type="range" min="0" max="300" value="112">
    </div>

    <div>
      <label for="noise">Noise amount · <span id="noiseval">1.06</span></label>
      <input id="noise" type="range" min="0" max="300" value="106">
    </div>

    <div>
      <label for="bayernr">Bayer NR · <span id="bayernrval">0.60</span></label>
      <input id="bayernr" type="range" min="0" max="300" value="60">
    </div>

    <div>
      <label for="chroma">Chroma NR · <span id="chromaval">1.00</span></label>
      <input id="chroma" type="range" min="0" max="300" value="100">
    </div>

    <div>
      <label for="jpeg">JPEG DCT · <span id="jpegval">0.20</span></label>
      <input id="jpeg" type="range" min="0" max="300" value="20">
    </div>

    <div>
      <label for="jpegquality">JPEG quality · <span id="jpegqualityval">58</span></label>
      <input id="jpegquality" type="range" min="1" max="100" value="58">
    </div>

    <div>
      <label for="jpegchroma">JPEG chroma · <span id="jpegchromaval">0.75</span></label>
      <input id="jpegchroma" type="range" min="0" max="100" value="75">
    </div>

    <div>
      <label for="jpegmidtone">JPEG midtones · <span id="jpegmidtoneval">0.45</span></label>
      <input id="jpegmidtone" type="range" min="0" max="100" value="45">
    </div>

    <div>
      <label for="jpeghighlight">JPEG highlights · <span id="jpeghighlightval">1.00</span></label>
      <input id="jpeghighlight" type="range" min="0" max="200" value="100">
    </div>

    <div>
      <label for="brightness">Brightness · <span id="brightnessval">0.00</span></label>
      <input id="brightness" type="range" min="-100" max="100" value="0">
    </div>

    <div>
      <label for="contrast">Contrast · <span id="contrastval">0.00</span></label>
      <input id="contrast" type="range" min="-100" max="100" value="0">
    </div>
    </div>

    <div id="analog-controls" hidden>
      <div>
        <label for="analog">VHS amount · <span id="analogval">3.00</span></label>
        <input id="analog" type="range" min="0" max="300" value="300">
      </div>

      <div>
        <label for="tracking">Tracking · <span id="trackingval">0.12</span></label>
        <input id="tracking" type="range" min="0" max="300" value="12">
      </div>

      <div>
        <label for="chromableed">Chroma bleed · <span id="chromableedval">3.00</span></label>
        <input id="chromableed" type="range" min="0" max="300" value="300">
      </div>

      <div>
        <label for="ringing">Ringing · <span id="ringingval">2.40</span></label>
        <input id="ringing" type="range" min="0" max="300" value="240">
      </div>

      <div>
        <label for="tapenoise">Tape noise · <span id="tapenoiseval">0.73</span></label>
        <input id="tapenoise" type="range" min="0" max="300" value="73">
      </div>

      <div>
        <label for="bandmask">Band mask · <span id="bandmaskval">0.62</span></label>
        <input id="bandmask" type="range" min="0" max="300" value="62">
      </div>

      <div>
        <label for="edgewave">Edge wave · <span id="edgewaveval">0.46</span></label>
        <input id="edgewave" type="range" min="0" max="300" value="46">
      </div>

      <div>
        <label for="dropouts">Dropouts · <span id="dropoutsval">1.66</span></label>
        <input id="dropouts" type="range" min="0" max="300" value="166">
      </div>

      <div>
        <label for="scanlines">Scanlines · <span id="scanlinesval">1.82</span></label>
        <input id="scanlines" type="range" min="0" max="300" value="182">
      </div>

      <div>
        <label for="headswitch">Head switch · <span id="headswitchval">0.12</span></label>
        <input id="headswitch" type="range" min="0" max="300" value="12">
      </div>
    </div>

    <div id="film-controls" hidden>
      <div>
        <label for="filmpreset">Film stock</label>
        <select id="filmpreset"></select>
      </div>

      <div>
        <label for="filmexposure">Exposure (stops) · <span id="filmexposureval">0.00</span></label>
        <input id="filmexposure" type="range" min="-300" max="300" value="0">
      </div>

      <div>
        <label for="filmgamma">Input gamma · <span id="filmgammaval">0.65</span></label>
        <input id="filmgamma" type="range" min="50" max="150" value="65">
      </div>

      <div>
        <label for="filmgrain">Grain · <span id="filmgrainval">1.00</span></label>
        <input id="filmgrain" type="range" min="0" max="300" value="100">
      </div>

      <div>
        <label for="filmgrainsize">Grain size · <span id="filmgrainsizeval">1.60</span></label>
        <input id="filmgrainsize" type="range" min="50" max="400" value="160">
      </div>

      <div>
        <label for="filmgrainsat">Grain colour · <span id="filmgrainsatval">0.80</span></label>
        <input id="filmgrainsat" type="range" min="0" max="100" value="80">
      </div>

      <div>
        <label for="filmchroma">Highlight burn · <span id="filmchromaval">0.70</span></label>
        <input id="filmchroma" type="range" min="0" max="100" value="70">
      </div>

      <div>
        <label for="filmhue">Hue restore · <span id="filmhueval">0.20</span></label>
        <input id="filmhue" type="range" min="0" max="100" value="20">
      </div>

      <div>
        <label for="filmhalation">Halation · <span id="filmhalationval">0.35</span></label>
        <input id="filmhalation" type="range" min="0" max="100" value="35">
      </div>

      <div>
        <label for="filmhalthreshold">Halation threshold · <span id="filmhalthresholdval">0.55</span></label>
        <input id="filmhalthreshold" type="range" min="0" max="100" value="55">
      </div>

      <div>
        <label for="filmhalradius">Halation radius · <span id="filmhalradiusval">1.50</span></label>
        <input id="filmhalradius" type="range" min="50" max="300" value="150">
      </div>

      <div>
        <label for="filmprintexp">Print exposure · <span id="filmprintexpval">0.00</span></label>
        <input id="filmprintexp" type="range" min="-100" max="100" value="0">
      </div>

      <div>
        <label for="filmwarmth">Print warmth · <span id="filmwarmthval">0.00</span></label>
        <input id="filmwarmth" type="range" min="-100" max="100" value="0">
      </div>

      <div>
        <label for="filmweave">Gate weave · <span id="filmweaveval">0.40</span></label>
        <input id="filmweave" type="range" min="0" max="200" value="40">
      </div>

      <div>
        <label for="filmflicker">Flicker · <span id="filmflickerval">0.12</span></label>
        <input id="filmflicker" type="range" min="0" max="100" value="12">
      </div>

      <button id="filmnegview">show negative</button>
    </div>

    <div id="infrared-controls" hidden>
      <div>
        <label for="infraredexposure">Exposure (stops) · <span id="infraredexposureval">1.00</span></label>
        <input id="infraredexposure" type="range" min="-200" max="400" value="100">
      </div>

      <div>
        <label for="infraredresponse">IR response · <span id="infraredresponseval">0.00</span></label>
        <input id="infraredresponse" type="range" min="0" max="100" value="0">
      </div>

      <div>
        <label for="infraredlocalgain">Local gain · <span id="infraredlocalgainval">0.35</span></label>
        <input id="infraredlocalgain" type="range" min="0" max="100" value="35">
      </div>

      <div>
        <label for="infraredglow">Halo bloom · <span id="infraredglowval">0.45</span></label>
        <input id="infraredglow" type="range" min="0" max="200" value="45">
      </div>

      <div>
        <label for="infraredglowthreshold">Bloom threshold · <span id="infraredglowthresholdval">0.60</span></label>
        <input id="infraredglowthreshold" type="range" min="0" max="100" value="60">
      </div>

      <div>
        <label for="infraredeyes">Eye flare · <span id="infraredeyesval">0.90</span></label>
        <input id="infraredeyes" type="range" min="0" max="200" value="90">
      </div>

      <div>
        <label for="infrarednoise">Scintillation · <span id="infrarednoiseval">0.70</span></label>
        <input id="infrarednoise" type="range" min="0" max="200" value="70">
      </div>

      <div>
        <label for="infraredvignette">Tube vignette · <span id="infraredvignetteval">0.30</span></label>
        <input id="infraredvignette" type="range" min="0" max="100" value="30">
      </div>

      <div>
        <label for="infraredhotspot">IR hotspot · <span id="infraredhotspotval">0.10</span></label>
        <input id="infraredhotspot" type="range" min="0" max="100" value="10">
      </div>
    </div>

    <button id="freeze-noise" class="active">unfreeze noise</button>

    <button id="record">record video</button>

    <div id="video-controls" hidden>
      <div class="button-row">
        <button id="playpause">play</button>
        <button id="mute">mute</button>
      </div>
      <div>
        <label for="seek">Scrub · <span id="timeval">0:00 / 0:00</span></label>
        <input id="seek" type="range" min="0" max="1000" step="1" value="0">
      </div>
      <div>
        <label for="volume">Volume · <span id="volval">100</span></label>
        <input id="volume" type="range" min="0" max="100" value="100">
      </div>
    </div>

    <div id="drop">drop an image or video here<br>(or click to choose)</div>
    <input id="file" type="file" accept="image/*,video/*" hidden>

    <div id="stage-controls">
      <label>Pipeline stages</label>
      <div class="stages" id="stages"></div>

      <div class="button-row">
        <button id="enable-stages">enable all</button>
        <button id="disable-stages">disable all</button>
      </div>
    </div>
    <div id="status">booting...</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PowerSHOT · WebGPU realtime ISP</title>
<link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div id="stage"><canvas id="view"></canvas></div>
  <div id="panel">
    <h1>PowerSHOT<small>realtime ISP · WebGPU / TSL</small></h1>

    <div>
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="digital">Digital camera</option>
        <option value="analog">Analog VHS</option>
      </select>
    </div>

    <div id="digital-controls">
    <div>
      <label for="preset">Camera preset</label>
      <select id="preset"></select>
    </div>

    <div>
      <label for="lens">Lens softness · <span id="lensval">0.28</span></label>
      <input id="lens" type="range" min="0" max="300" value="28">
    </div>

    <div>
      <label for="bloom">CCD bloom · <span id="bloomval">1.12</span></label>
      <input id="bloom" type="range" min="0" max="300" value="112">
    </div>

    <div>
      <label for="noise">Noise amount · <span id="noiseval">1.06</span></label>
      <input id="noise" type="range" min="0" max="300" value="106">
    </div>

    <div>
      <label for="bayernr">Bayer NR · <span id="bayernrval">0.60</span></label>
      <input id="bayernr" type="range" min="0" max="300" value="60">
    </div>

    <div>
      <label for="chroma">Chroma NR · <span id="chromaval">1.00</span></label>
      <input id="chroma" type="range" min="0" max="300" value="100">
    </div>

    <div>
      <label for="jpeg">JPEG DCT · <span id="jpegval">0.20</span></label>
      <input id="jpeg" type="range" min="0" max="300" value="20">
    </div>
    </div>

    <div id="analog-controls" hidden>
      <div>
        <label for="analog">VHS amount · <span id="analogval">0.65</span></label>
        <input id="analog" type="range" min="0" max="300" value="65">
      </div>

      <div>
        <label for="tracking">Tracking · <span id="trackingval">0.45</span></label>
        <input id="tracking" type="range" min="0" max="300" value="45">
      </div>

      <div>
        <label for="chromableed">Chroma bleed · <span id="chromableedval">0.75</span></label>
        <input id="chromableed" type="range" min="0" max="300" value="75">
      </div>

      <div>
        <label for="ringing">Ringing · <span id="ringingval">0.65</span></label>
        <input id="ringing" type="range" min="0" max="300" value="65">
      </div>

      <div>
        <label for="tapenoise">Tape noise · <span id="tapenoiseval">0.75</span></label>
        <input id="tapenoise" type="range" min="0" max="300" value="75">
      </div>

      <div>
        <label for="edgewave">Edge wave · <span id="edgewaveval">0.35</span></label>
        <input id="edgewave" type="range" min="0" max="300" value="35">
      </div>

      <div>
        <label for="dropouts">Dropouts · <span id="dropoutsval">0.35</span></label>
        <input id="dropouts" type="range" min="0" max="300" value="35">
      </div>

      <div>
        <label for="scanlines">Scanlines · <span id="scanlinesval">0.55</span></label>
        <input id="scanlines" type="range" min="0" max="300" value="55">
      </div>

      <div>
        <label for="headswitch">Head switch · <span id="headswitchval">0.45</span></label>
        <input id="headswitch" type="range" min="0" max="300" value="45">
      </div>
    </div>

    <button id="freeze-noise" class="active">unfreeze noise</button>

    <div id="drop">drop an image here<br>(or click to choose)</div>
    <input id="file" type="file" accept="image/*" hidden>

    <div id="stage-controls">
      <label>Pipeline stages</label>
      <div class="stages" id="stages"></div>

      <div class="button-row">
        <button id="enable-stages">enable all</button>
        <button id="disable-stages">disable all</button>
      </div>
    </div>
    <div id="status">booting...</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
